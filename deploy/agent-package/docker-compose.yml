services:
  kyss-agent:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 256m
    cpus: "0.50"
    volumes:
      - ./agent-data:/agent-data
