{% extends "base.html" %}
{% block title %}Вход — KYSSCHECK{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card p-4">
      <h1 class="h4 mb-3">Вход</h1>
      <p class="text-secondary small">Войдите в аккаунт для доступа к панели мониторинга.</p>
      {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login" class="d-grid gap-3">
        <div>
          <label class="form-label">Логин</label>
          <input class="form-control" name="username" minlength="3" maxlength="64" required>
        </div>
        <div>
          <label class="form-label">Пароль</label>
          <input class="form-control" name="password" type="password" minlength="8" maxlength="128" required>
        </div>
        <button class="btn btn-primary" type="submit">Войти</button>
      </form>
      <a class="small mt-3" href="/register">Нет аккаунта? Зарегистрироваться</a>
    </div>
  </div>
</div>
{% endblock %}
